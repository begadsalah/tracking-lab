    <h1>Server Side Tracking Test</h1>
    <p>Status: Monitoring DataLayer...</p>

    <button id="purchase-btn" onclick="buy()">Buy Product (50€)</button>

    <script>
    function buy(){
      // Ensure dataLayer exists before pushing
      window.dataLayer = window.dataLayer || [];
      
      dataLayer.push({
        'event': 'purchase',
        'ecommerce': {
          'transaction_id': 'T_' + Math.floor(Math.random() * 1000), // Random ID for testing
          'value': 50.00,
          'currency': 'EUR',
          'items': [{
            'item_name': 'Server-Side Course',
            'item_id': 'SS_101',
            'price': 50.00,
            'quantity': 1
          }]
        }
      });
      console.log("Event 'purchase' pushed to dataLayer");
    }
    </script>
